services:
  - type: web
    name: payunit-microservice
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: PAYUNIT_API_USERNAME
        sync: false   # À renseigner manuellement dans le dashboard Render
      - key: PAYUNIT_API_PASSWORD
        sync: false
      - key: PAYUNIT_API_KEY
        sync: false
      - key: PAYUNIT_MODE
        value: test
      - key: PAYUNIT_BASE_URL
        value: https://gateway.payunit.net/api
      - key: PAYUNIT_NOTIFY_URL
        sync: false   # Sera l'URL Render + /api/payment/callback
      - key: PAYUNIT_RETURN_URL
        sync: false
      - key: PAYUNIT_CANCEL_URL
        sync: false
      - key: PAYUNIT_WEBHOOK_SECRET
        sync: false
      - key: MICROSERVICE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: payunit-db
          property: connectionString

databases:
  - name: payunit-db
    plan: free
    databaseName: payunit_dev
    user: payunit_user
